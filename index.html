<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kremen</title>
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@300;400&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --amber: #e8a000;
      --amber-bright: #ffb700;
      --amber-dim: #6b4200;
      --amber-glow: rgba(232,160,0,0.55);
      --bg: #0c0800;
    }

    @keyframes flicker {
      0%,18%,22%,25%,53%,57%,100% { opacity: 1; }
      20%,24%,55% { opacity: 0.965; }
    }
    @keyframes cursor { 0%,100%{opacity:1} 50%{opacity:0} }

    html,body { min-height:100vh; background:var(--bg); }

    body {
      position:relative; display:flex; justify-content:center;
      padding:4rem 1.5rem 6rem;
      font-family:'VT323',monospace; font-size:28px; line-height:1.75;
      color:var(--amber); animation:flicker 14s infinite;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:10;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);
    }
    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:11;
      background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%);
    }

    #starfield { position:fixed; inset:0; z-index:0; pointer-events:none; }

    #boot-overlay {
      position:fixed; inset:0; z-index:100; background:var(--bg);
      padding:3rem 3.5rem; pointer-events:none;
      font-family:'VT323',monospace; font-size:22px; color:var(--amber);
      text-shadow:0 0 8px var(--amber-glow); transition:opacity 0.8s;
    }
    #boot-text { white-space:pre-wrap; line-height:1.6; }

    .screen { position:relative; max-width:950px; width:100%; padding:3rem 2.5rem; }

    #content { position:relative; z-index:1; }
    #content * { text-shadow:0 0 7px var(--amber-glow),0 0 2px rgba(232,160,0,0.4); }
    #content h1,#content h2,#content h3,#content strong { font-family:'VT323',monospace; }
    #content h1 { font-size:2.4em; letter-spacing:0.04em; margin-bottom:0.3em; text-shadow:0 0 14px var(--amber-glow),0 0 4px rgba(232,160,0,0.5); }
    #content h2 { font-size:1.15em; margin:1.6em 0 0.4em; color:var(--amber-bright); letter-spacing:0.03em; }
    #content h3 { font-size:1.2em; margin:1.2em 0 0.3em; }
    #content p  { margin-bottom:0.9em; opacity:0.9; font-family:'Inter',sans-serif; font-size:0.56em; line-height:1.7; letter-spacing:0; }
    #content a  { color:var(--amber-bright); text-decoration:none; border-bottom:1px solid var(--amber-dim); transition:border-color 0.1s; }
    #content a:hover { border-bottom-color:var(--amber-bright); }
    #content ul,#content ol { margin:0 0 0.9em 1.4em; }
    #content li { margin-bottom:0.4em; font-family:'Inter',sans-serif; font-size:0.56em; line-height:1.7; letter-spacing:0; }
    #content hr { border:none; border-top:1px solid var(--amber-dim); margin:1.6em 0; opacity:0.45; }
    #content strong { color:var(--amber-bright); }
    #content em { opacity:0.75; font-style:normal; }
    #content code { font-family:'VT323',monospace; background:rgba(232,160,0,0.07); border:1px solid var(--amber-dim); padding:0 0.35em; }
    #content pre  { background:rgba(232,160,0,0.05); border:1px solid var(--amber-dim); padding:1em 1.2em; margin-bottom:1em; overflow-x:auto; }
    #content pre code { background:none; border:none; padding:0; }
    #content blockquote { border-left:2px solid var(--amber-dim); padding-left:1em; opacity:0.7; }
    #content:empty::after { content:'_'; animation:cursor 1s step-end infinite; text-shadow:0 0 7px var(--amber-glow); }

    #map-wrap { position:relative; z-index:1; margin-top:1rem; border-top:1px solid rgba(107,66,0,0.4); padding-top:1.2rem; }
    #map-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.5rem; font-size:0.78em; letter-spacing:0.18em; opacity:0.6; text-shadow:0 0 6px var(--amber-glow); }
    #map-coords { opacity:1; letter-spacing:0.1em; }
    #map { width:100%; display:block; border:1px solid rgba(107,66,0,0.3); }
    #map-footer { display:flex; justify-content:space-between; margin-top:0.4rem; font-size:0.72em; opacity:0.45; letter-spacing:0.12em; }
    #map-tooltip {
      position:absolute; display:none; pointer-events:none; z-index:20;
      background:#0c0800; border:1px solid var(--amber-dim);
      padding:0.5em 0.8em; max-width:220px; line-height:1.4;
      box-shadow:0 0 12px rgba(232,160,0,0.2),inset 0 0 20px rgba(0,0,0,0.4);
    }
    #map-tooltip .tt-name { color:var(--amber-bright); font-size:0.9em; letter-spacing:0.12em; text-shadow:0 0 8px var(--amber-glow); display:block; margin-bottom:0.15em; }
    #map-tooltip .tt-text { color:var(--amber); font-size:0.78em; opacity:0.85; }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div id="boot-overlay"><pre id="boot-text"></pre></div>

  <div class="screen">
    <div id="content"></div>
    <div id="map-wrap">
      <div id="map-header">
        <span id="map-coords">&nbsp;</span>
      </div>
      <canvas id="map"></canvas>
      <div id="map-tooltip"><span class="tt-name"></span><span class="tt-text"></span></div>
      <div id="map-footer">
        <span id="map-city-label">&nbsp;</span>
        <span>ZOOM 1.00</span>
      </div>
    </div>
  </div>

<script>
// ── shared data ────────────────────────────────────
const CITIES = [
  { name:'Vancouver',   lat:49.28,   lon:-123.12, tooltip:'' },
  { name:'Bern',        lat:46.95,   lon:  7.45,  tooltip:'' },
  { name:'Singapore',   lat: 1.35,   lon:103.82,  tooltip:'' },
  { name:'Cannes',      lat:43.55,   lon:  7.02,  tooltip:'' },
  { name:'Tokyo',       lat:35.68,   lon:139.65,  tooltip:'' },
  { name:'Yosemite',    lat:37.865,  lon:-119.54, tooltip:'' },
  { name:'Los Angeles', lat:34.052,  lon:-118.24, tooltip:'' },
];

window.worldData = fetch('countries-110m.json').then(r => r.json());

// ── boot sequence ──────────────────────────────────
(function(){
  const overlay = document.getElementById('boot-overlay');
  const out     = document.getElementById('boot-text');
  const COOLDOWN = 60 * 60 * 1000; // 1 hour
  const last = parseInt(localStorage.getItem('kremen_boot')||'0',10);
  if(Date.now()-last < COOLDOWN){ overlay.style.display='none'; startGlitch(); return; }
  localStorage.setItem('kremen_boot', Date.now());
  const lines = [
    '[    0.000000] Linux version 6.6.0-kremen #1 SMP PREEMPT_DYNAMIC',
    '[    0.000001] Command line: BOOT_IMAGE=/vmlinuz root=/dev/nvme0n1p2 quiet',
    '[    0.041337] ACPI: IRQ0 used by override.',
    '[    0.312000] PCI: Using configuration type 1 for base access',
    '[    0.420000] Initializing cgroup subsys cpuset ... done',
    '[    0.694200] Loading /proc/self/ego ... ENOENT (expected)',
    '[    1.000000] systemd[1]: Reached target Basic System.',
    '[    1.001000] Started D-Bus System Message Bus.',
    '[    1.337000] mate.service: refill #4 initiated',
    '[    1.338000] mate.service: ENOYERBA — continuing on willpower',
    '[    1.339000] imposter-syndrome.service: active (running) since boot',
    '[    1.802000] identity-manager.service: 19 profiles loaded — arbitrating persona',
    '[    2.001000] ssh: no host key found, generating new identity',
    '[    2.100000] Reached target Multi-User System.',
    '[    2.101000] Started kremen.io.',
    '',
    'kremen login: _',
  ];
  let li=0, ci=0, text='';
  function tick(){
    if(li>=lines.length){
      setTimeout(()=>{ overlay.style.opacity='0'; setTimeout(()=>{ overlay.style.display='none'; startGlitch(); },800); },400);
      return;
    }
    const line=lines[li];
    if(ci<line.length){ text+=line[ci++]; out.textContent=text+'█'; setTimeout(tick,4+Math.random()*4); }
    else{ text+='\n'; out.textContent=text+'█'; li++;ci=0; setTimeout(tick,li<16?30:220); }
  }
  tick();
})();

// ── starfield ──────────────────────────────────────
(function(){
  const canvas=document.getElementById('starfield');
  const ctx=canvas.getContext('2d');
  const resize=()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; };
  resize(); window.addEventListener('resize',resize);
  const CHARS=['.','·','+','·','.'];
  const stars=Array.from({length:65},()=>({
    x:Math.random(), y:Math.random(),
    vx:(Math.random()-0.5)*0.00012, vy:(Math.random()-0.5)*0.00012,
    ch:CHARS[Math.floor(Math.random()*CHARS.length)],
    op:Math.random()*0.22+0.05,
    sz:Math.floor(Math.random()*3)+10,
  }));
  function draw(){
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.x=(s.x+s.vx+1)%1; s.y=(s.y+s.vy+1)%1;
      ctx.fillStyle=`rgba(232,160,0,${s.op})`;
      ctx.font=`${s.sz}px VT323,monospace`;
      ctx.fillText(s.ch,s.x*W,s.y*H);
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── signal corruption ──────────────────────────────
function startGlitch(){
  const NOISE='!@#$%^&*<>?/|[]{}=~`░▒▓╬╫╪┼╔╗╚╝║═';
  const body=document.body;
  // WeakMap stores the TRUE original so stacked glitches never corrupt the baseline
  const originals=new WeakMap();
  const restoreTimers=new WeakMap();

  function getNodes(){
    const el=document.getElementById('content');
    if(!el)return [];
    const walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT,{
      acceptNode(n){
        const p=n.parentElement;
        if(!p)return NodeFilter.FILTER_REJECT;
        const tag=p.tagName;
        if(/^H[1-6]$/.test(tag)||tag==='STRONG'||tag==='EM')return NodeFilter.FILTER_ACCEPT;
        return NodeFilter.FILTER_REJECT;
      }
    });
    const nodes=[]; let n;
    while((n=walker.nextNode()))if(n.textContent.trim().length>2)nodes.push(n);
    return nodes;
  }

  function corrupt(node,ms){
    // Capture true original only once per node
    if(!originals.has(node)) originals.set(node,node.textContent);
    const orig=originals.get(node);
    const len=Math.floor(Math.random()*12)+3;
    const start=Math.floor(Math.random()*Math.max(1,orig.length-len));
    let g=orig.slice(0,start);
    for(let i=0;i<len;i++)g+=NOISE[Math.floor(Math.random()*NOISE.length)];
    node.textContent=g+orig.slice(start+len);
    // Clear any pending restore, schedule a new one
    clearTimeout(restoreTimers.get(node));
    restoreTimers.set(node, setTimeout(()=>{
      node.textContent=orig;
      originals.delete(node);
    }, ms));
  }

  function nukeNode(){
    const nodes=getNodes(); if(!nodes.length)return;
    const node=nodes[Math.floor(Math.random()*nodes.length)];
    if(!originals.has(node)) originals.set(node,node.textContent);
    const orig=originals.get(node);
    node.textContent=Array.from({length:orig.length},()=>NOISE[Math.floor(Math.random()*NOISE.length)]).join('');
    clearTimeout(restoreTimers.get(node));
    restoreTimers.set(node, setTimeout(()=>{ node.textContent=orig; originals.delete(node); },60+Math.random()*80));
  }

  function scrambleNode(delay=0){
    const nodes=getNodes(); if(!nodes.length)return;
    const node=nodes[Math.floor(Math.random()*nodes.length)];
    setTimeout(()=>corrupt(node, 50+Math.random()*120), delay);
  }

  function burst(){
    const count=Math.floor(Math.random()*4)+2;
    for(let i=0;i<count;i++) scrambleNode(i*55+Math.random()*40);
  }

  function flicker(){
    body.style.filter='brightness(1.6) hue-rotate(8deg)';
    setTimeout(()=>{ body.style.filter='brightness(0.4)'; },30);
    setTimeout(()=>{ body.style.filter=''; },80);
  }

  function glitch(){
    const r=Math.random();
    if(r<0.45)      scrambleNode();
    else if(r<0.70) burst();
    else if(r<0.85) nukeNode();
    else            { burst(); flicker(); }
    sched();
  }

  function sched(){ setTimeout(glitch,5500+Math.random()*3000); }
  sched();
}

// ── content loader ─────────────────────────────────
marked.use({ renderer:{ link({href,title,text}){ return `<a href="${href}"${title?` title="${title}"`:''}  target="_blank" rel="noopener">${text}</a>`; } } });
marked.setOptions({breaks:true});
fetch('content.md')
  .then(r=>{ if(!r.ok)throw new Error(r.status); return r.text(); })
  .then(text=>{ document.getElementById('content').innerHTML=marked.parse(text); })
  .catch(err=>{ document.getElementById('content').textContent='// error: '+err.message; });

// ── map ────────────────────────────────────────────
(async function(){ try{
  const canvas=document.getElementById('map');
  const ctx=canvas.getContext('2d');
  const wrap=document.getElementById('map-wrap');
  const coordsEl=document.getElementById('map-coords');
  const cityLabelEl=document.getElementById('map-city-label');
  const tooltip=document.getElementById('map-tooltip');
  const ttName=tooltip.querySelector('.tt-name');
  const ttText=tooltip.querySelector('.tt-text');
  const mapHeader=document.getElementById('map-header');

  const W=wrap.clientWidth, H=Math.round(W*0.54);
  const DPR=window.devicePixelRatio||1;
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.scale(DPR,DPR);

  const AMBER='#e8a000', AMBER_BRIGHT='#ffb700';
  const LAND_FILL='rgba(232,160,0,0.09)', LAND_STROKE='rgba(232,160,0,0.6)';
  const BORDER='rgba(232,160,0,0.2)', GRID='rgba(232,160,0,0.1)';

  const LON_MIN=-165,LON_MAX=170,LAT_MAX=76,LAT_MIN=-57;
  const LON_SPAN=LON_MAX-LON_MIN, LAT_SPAN=LAT_MAX-LAT_MIN;
  function project(lon,lat){ return [(lon-LON_MIN)/LON_SPAN*W,(LAT_MAX-lat)/LAT_SPAN*H]; }
  function unproject(x,y){ return [x/W*LON_SPAN+LON_MIN, LAT_MAX-y/H*LAT_SPAN]; }

  function tracePath(geom){
    if(!geom)return;
    if(geom.type==='Polygon') geom.coordinates.forEach(traceRing);
    else if(geom.type==='MultiPolygon') geom.coordinates.forEach(p=>p.forEach(traceRing));
    else if(geom.type==='LineString') traceLine(geom.coordinates);
    else if(geom.type==='MultiLineString') geom.coordinates.forEach(traceLine);
    else if(geom.type==='GeometryCollection') geom.geometries.forEach(tracePath);
    else if(geom.type==='Feature') tracePath(geom.geometry);
    else if(geom.type==='FeatureCollection') geom.features.forEach(tracePath);
  }
  function traceRing(coords){
    if(!coords.length)return;
    ctx.moveTo(...project(coords[0][0],coords[0][1]));
    let pLon=coords[0][0];
    for(let i=1;i<coords.length;i++){
      const[lon,lat]=coords[i],[x,y]=project(lon,lat);
      if(Math.abs(lon-pLon)>180)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      pLon=lon;
    }
  }
  function traceLine(coords){
    if(!coords.length)return;
    ctx.moveTo(...project(coords[0][0],coords[0][1]));
    let pLon=coords[0][0];
    for(let i=1;i<coords.length;i++){
      const[lon,lat]=coords[i],[x,y]=project(lon,lat);
      if(Math.abs(lon-pLon)>180)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      pLon=lon;
    }
  }

  const world=await window.worldData;
  const land=topojson.feature(world,world.objects.land);
  const bordersMesh=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);

  function fillGeom(geom){
    if(!geom)return;
    if(geom.type==='Polygon'){ ctx.beginPath();traceRing(geom.coordinates[0]);ctx.fillStyle=LAND_FILL;ctx.fill(); }
    else if(geom.type==='MultiPolygon') geom.coordinates.forEach(p=>{ ctx.beginPath();traceRing(p[0]);ctx.fillStyle=LAND_FILL;ctx.fill(); });
    else if(geom.type==='Feature') fillGeom(geom.geometry);
    else if(geom.type==='FeatureCollection') geom.features.forEach(f=>fillGeom(f.geometry));
  }

  const cityDots=CITIES.map(c=>{ const[x,y]=project(c.lon,c.lat); return{...c,x,y}; });
  let hoveredCity=null, t=0;

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();

    ctx.beginPath();
    for(let lon=-150;lon<180;lon+=30){
      const[x0,y0]=project(lon,LAT_MAX),[,y1]=project(lon,LAT_MIN);
      ctx.moveTo(x0,y0); ctx.lineTo(x0,y1);
    }
    ctx.strokeStyle=GRID; ctx.lineWidth=0.4; ctx.shadowBlur=0; ctx.stroke();

    fillGeom(land);
    ctx.beginPath(); tracePath(land);
    ctx.strokeStyle=LAND_STROKE; ctx.lineWidth=0.6;
    ctx.shadowColor=AMBER; ctx.shadowBlur=5; ctx.stroke(); ctx.shadowBlur=0;
    ctx.beginPath(); tracePath(bordersMesh);
    ctx.strokeStyle=BORDER; ctx.lineWidth=0.4; ctx.stroke();

    t+=0.022;
    for(const city of cityDots){
      const isHover=hoveredCity===city.name;
      const pulse=Math.sin(t+city.x*0.05)*0.5+0.5;
      ctx.beginPath(); ctx.arc(city.x,city.y,5+pulse*6,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,183,0,${(0.12+pulse*0.18).toFixed(2)})`; ctx.lineWidth=0.8; ctx.shadowBlur=0; ctx.stroke();
      ctx.beginPath(); ctx.arc(city.x,city.y,isHover?4.5:3,0,Math.PI*2);
      ctx.fillStyle=AMBER_BRIGHT; ctx.shadowColor=AMBER_BRIGHT; ctx.shadowBlur=isHover?22:10; ctx.fill(); ctx.shadowBlur=0;
    }
    ctx.restore();
    requestAnimationFrame(draw);
  }

  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const[lon,lat]=unproject(mx,my);
    const ns=lat>=0?'N':'S', ew=lon>=0?'E':'W';
    coordsEl.textContent=`${Math.abs(lat).toFixed(2)}°${ns}  ${Math.abs(lon).toFixed(2)}°${ew}`;
    let found=null;
    for(const city of cityDots){ const dx=mx-city.x,dy=my-city.y; if(Math.sqrt(dx*dx+dy*dy)<14){found=city;break;} }
    hoveredCity=found?found.name:null;
    cityLabelEl.textContent=hoveredCity?'> '+hoveredCity.toUpperCase():'\u00a0';
    canvas.style.cursor=hoveredCity?'crosshair':'default';
    if(found){
      ttName.textContent=found.name.toUpperCase(); ttText.textContent=found.tooltip;
      ttText.style.display=found.tooltip?'block':'none';
      const headerH=mapHeader.offsetHeight;
      let tx=found.x+14, ty=headerH+found.y-10;
      if(tx+230>W)tx=found.x-230;
      tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px'; tooltip.style.display='block';
    } else tooltip.style.display='none';
  });
  canvas.addEventListener('mouseleave',()=>{
    hoveredCity=null; coordsEl.textContent='\u00a0'; cityLabelEl.textContent='\u00a0';
    tooltip.style.display='none'; canvas.style.cursor='default';
  });
  draw();
} catch(e){
  const c=document.getElementById('map'),ctx=c.getContext('2d');
  ctx.fillStyle='#e8a000'; ctx.font="16px 'VT323',monospace";
  ctx.fillText('// map error: '+e.message,10,30); console.error(e);
}})();
</script>
</body>
</html>
