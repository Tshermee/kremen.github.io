<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kremen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --amber: #e8a000;
      --amber-bright: #ffb700;
      --amber-dim: #6b4200;
      --amber-glow: rgba(232, 160, 0, 0.55);
      --bg: #0c0800;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.965; }
    }

    @keyframes cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
    }

    body {
      position: relative;
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem 6rem;
      font-family: 'VT323', monospace;
      font-size: 28px;
      line-height: 1.75;
      color: var(--amber);
      animation: flicker 14s infinite;
    }

    /* scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.13) 2px,
        rgba(0, 0, 0, 0.13) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 11;
    }

    .screen {
      position: relative;
      max-width: 950px;
      width: 100%;
      padding: 3rem 2.5rem;
    }

    #content {
      position: relative;
      z-index: 1;
    }

    #content * {
      text-shadow: 0 0 7px var(--amber-glow), 0 0 2px rgba(232, 160, 0, 0.4);
    }

    #content h1 {
      font-size: 2.4em;
      letter-spacing: 0.04em;
      margin-bottom: 0.3em;
      text-shadow: 0 0 14px var(--amber-glow), 0 0 4px rgba(232, 160, 0, 0.5);
    }

    #content h2 {
      font-size: 1.5em;
      margin: 1.6em 0 0.4em;
      color: var(--amber-bright);
      letter-spacing: 0.03em;
      text-shadow: 0 0 10px var(--amber-glow), 0 0 3px rgba(255, 183, 0, 0.5);
    }

    #content h3 {
      font-size: 1.2em;
      margin: 1.2em 0 0.3em;
    }

    #content p {
      margin-bottom: 0.9em;
      opacity: 0.9;
    }

    #content a {
      color: var(--amber-bright);
      text-decoration: none;
      border-bottom: 1px solid var(--amber-dim);
      transition: border-color 0.1s;
    }

    #content a:hover {
      border-bottom-color: var(--amber-bright);
      text-shadow: 0 0 16px var(--amber-glow), 0 0 6px rgba(255, 183, 0, 0.6);
    }

    #content ul,
    #content ol {
      margin: 0 0 0.9em 1.4em;
    }

    #content li {
      margin-bottom: 0.15em;
    }

    #content hr {
      border: none;
      border-top: 1px solid var(--amber-dim);
      margin: 1.6em 0;
      opacity: 0.45;
    }

    #content strong {
      color: var(--amber-bright);
    }

    #content em {
      opacity: 0.75;
      font-style: normal;
    }

    #content code {
      font-family: 'VT323', monospace;
      background: rgba(232, 160, 0, 0.07);
      border: 1px solid var(--amber-dim);
      padding: 0 0.35em;
    }

    #content pre {
      background: rgba(232, 160, 0, 0.05);
      border: 1px solid var(--amber-dim);
      padding: 1em 1.2em;
      margin-bottom: 1em;
      overflow-x: auto;
    }

    #content pre code {
      background: none;
      border: none;
      padding: 0;
    }

    #content blockquote {
      border-left: 2px solid var(--amber-dim);
      padding-left: 1em;
      opacity: 0.7;
    }

    #content:empty::after {
      content: '_';
      animation: cursor 1s step-end infinite;
      text-shadow: 0 0 7px var(--amber-glow);
    }

    /* Map */
    #map-wrap {
      position: relative;
      z-index: 1;
      margin-top: 2.5rem;
      border-top: 1px solid rgba(107, 66, 0, 0.4);
      padding-top: 1.2rem;
    }

    #map-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
      font-size: 0.78em;
      letter-spacing: 0.18em;
      opacity: 0.6;
      text-shadow: 0 0 6px var(--amber-glow);
    }

    #map-coords {
      opacity: 1;
      letter-spacing: 0.1em;
    }

    #map {
      width: 100%;
      display: block;
      border: 1px solid rgba(107, 66, 0, 0.3);
    }

    #map-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 0.4rem;
      font-size: 0.72em;
      opacity: 0.45;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div id="content"></div>

    <div id="map-wrap">
      <div id="map-header">
        <span>// LOCATOR</span>
        <span id="map-coords">&nbsp;</span>
      </div>
      <canvas id="map"></canvas>
      <div id="map-footer">
        <span id="map-city-label">&nbsp;</span>
        <span>ZOOM 1.00</span>
      </div>
    </div>
  </div>

  <script>
    // Content loader
    marked.setOptions({ breaks: true });
    fetch('content.md')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => { document.getElementById('content').innerHTML = marked.parse(text); })
      .catch(err => { document.getElementById('content').textContent = '// error loading content — ' + err.message; });

    // Map — no d3, manual equirectangular projection
    (async function () { try {
      const canvas = document.getElementById('map');
      const ctx = canvas.getContext('2d');
      const wrap = document.getElementById('map-wrap');
      const coordsEl = document.getElementById('map-coords');
      const cityLabelEl = document.getElementById('map-city-label');

      const W = wrap.clientWidth;
      const H = Math.round(W * 0.54);
      const DPR = window.devicePixelRatio || 1;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(DPR, DPR);

      const AMBER        = '#e8a000';
      const AMBER_BRIGHT = '#ffb700';
      const LAND_FILL    = 'rgba(232, 160, 0, 0.09)';
      const LAND_STROKE  = 'rgba(232, 160, 0, 0.6)';
      const BORDER       = 'rgba(232, 160, 0, 0.2)';
      const GRID         = 'rgba(232, 160, 0, 0.1)';

      const cities = [
        { name: 'Vancouver',  lat: 49.28,  lon: -123.12 },
        { name: 'Bern',       lat: 46.95,  lon:    7.45 },
        { name: 'Singapore',  lat:  1.35,  lon:  103.82 },
        { name: 'Cannes',     lat: 43.55,  lon:    7.02 },
        { name: 'Tokyo',      lat: 35.68,  lon:  139.65 },
      ];

      // Cropped equirectangular — trims edges to zoom in
      const LON_MIN = -165, LON_MAX = 170;
      const LAT_MAX =   76, LAT_MIN = -57;
      const LON_SPAN = LON_MAX - LON_MIN;
      const LAT_SPAN = LAT_MAX - LAT_MIN;

      function project(lon, lat) {
        return [
          (lon - LON_MIN) / LON_SPAN * W,
          (LAT_MAX - lat) / LAT_SPAN * H
        ];
      }
      function unproject(x, y) {
        return [
          x / W * LON_SPAN + LON_MIN,
          LAT_MAX - y / H * LAT_SPAN
        ];
      }

      function tracePath(geom) {
        if (!geom) return;
        if (geom.type === 'Polygon') {
          geom.coordinates.forEach(traceRing);
        } else if (geom.type === 'MultiPolygon') {
          geom.coordinates.forEach(p => p.forEach(traceRing));
        } else if (geom.type === 'LineString') {
          traceLine(geom.coordinates);
        } else if (geom.type === 'MultiLineString') {
          geom.coordinates.forEach(traceLine);
        } else if (geom.type === 'GeometryCollection') {
          geom.geometries.forEach(tracePath);
        } else if (geom.type === 'Feature') {
          tracePath(geom.geometry);
        } else if (geom.type === 'FeatureCollection') {
          geom.features.forEach(tracePath);
        }
      }
      function traceRing(coords) {
        if (!coords.length) return;
        const [x0, y0] = project(coords[0][0], coords[0][1]);
        ctx.moveTo(x0, y0);
        let prevX = x0;
        for (let i = 1; i < coords.length; i++) {
          const [x, y] = project(coords[i][0], coords[i][1]);
          if (Math.abs(x - prevX) > W / 2) ctx.moveTo(x, y); // antimeridian jump
          else ctx.lineTo(x, y);
          prevX = x;
        }
        if (Math.abs(x0 - prevX) <= W / 2) ctx.closePath();
      }
      function traceLine(coords) {
        if (!coords.length) return;
        const [x0, y0] = project(coords[0][0], coords[0][1]);
        ctx.moveTo(x0, y0);
        let prevX = x0;
        for (let i = 1; i < coords.length; i++) {
          const [x, y] = project(coords[i][0], coords[i][1]);
          if (Math.abs(x - prevX) > W / 2) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
          prevX = x;
        }
      }

      const world = await fetch('countries-110m.json').then(r => r.json());
      const land        = topojson.feature(world, world.objects.land);
      const bordersMesh = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

      const cityDots = cities.map(c => {
        const [x, y] = project(c.lon, c.lat);
        return { ...c, x, y };
      });

      let hoveredCity = null;
      let t = 0;

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Graticule — vertical lines only
        ctx.beginPath();
        for (let lon = -150; lon < 180; lon += 30) {
          const [x0, y0] = project(lon, LAT_MAX);
          const [,   y1] = project(lon, LAT_MIN);
          ctx.moveTo(x0, y0); ctx.lineTo(x0, y1);
        }
        ctx.strokeStyle = GRID;
        ctx.lineWidth = 0.4;
        ctx.shadowBlur = 0;
        ctx.stroke();

        // Land fill
        ctx.beginPath();
        tracePath(land);
        ctx.fillStyle = LAND_FILL;
        ctx.fill('evenodd');

        // Land outline + glow
        ctx.beginPath();
        tracePath(land);
        ctx.strokeStyle = LAND_STROKE;
        ctx.lineWidth = 0.6;
        ctx.shadowColor = AMBER;
        ctx.shadowBlur = 5;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Country borders
        ctx.beginPath();
        tracePath(bordersMesh);
        ctx.strokeStyle = BORDER;
        ctx.lineWidth = 0.4;
        ctx.stroke();

        // City dots
        t += 0.022;
        for (const city of cityDots) {
          const isHover = hoveredCity === city.name;
          const pulse = Math.sin(t + city.x * 0.05) * 0.5 + 0.5;

          ctx.beginPath();
          ctx.arc(city.x, city.y, 5 + pulse * 6, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255,183,0,${(0.12 + pulse * 0.18).toFixed(2)})`;
          ctx.lineWidth = 0.8;
          ctx.shadowBlur = 0;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(city.x, city.y, isHover ? 4.5 : 3, 0, Math.PI * 2);
          ctx.fillStyle = AMBER_BRIGHT;
          ctx.shadowColor = AMBER_BRIGHT;
          ctx.shadowBlur = isHover ? 22 : 10;
          ctx.fill();
          ctx.shadowBlur = 0;

          if (isHover) {
            const label = city.name.toUpperCase();
            ctx.font = "15px 'VT323', monospace";
            ctx.fillStyle = AMBER_BRIGHT;
            ctx.shadowColor = AMBER;
            ctx.shadowBlur = 10;
            const tw = ctx.measureText(label).width;
            let lx = city.x + 10, ly = city.y + 5;
            if (lx + tw > W - 6) lx = city.x - tw - 10;
            if (ly > H - 10) ly = city.y - 10;
            ctx.fillText(label, lx, ly);
            ctx.shadowBlur = 0;
          }
        }

        requestAnimationFrame(draw);
      }

      canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const [lon, lat] = unproject(mx, my);
        const ns = lat >= 0 ? 'N' : 'S', ew = lon >= 0 ? 'E' : 'W';
        coordsEl.textContent = `${Math.abs(lat).toFixed(2)}°${ns}  ${Math.abs(lon).toFixed(2)}°${ew}`;
        hoveredCity = null;
        for (const city of cityDots) {
          const dx = mx - city.x, dy = my - city.y;
          if (Math.sqrt(dx*dx + dy*dy) < 14) { hoveredCity = city.name; break; }
        }
        cityLabelEl.textContent = hoveredCity ? '> ' + hoveredCity.toUpperCase() : '\u00a0';
        canvas.style.cursor = hoveredCity ? 'crosshair' : 'default';
      });

      canvas.addEventListener('mouseleave', () => {
        hoveredCity = null;
        coordsEl.textContent = '\u00a0';
        cityLabelEl.textContent = '\u00a0';
        canvas.style.cursor = 'default';
      });

      draw();
    } catch(e) {
      const canvas = document.getElementById('map');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#e8a000';
      ctx.font = "16px 'VT323', monospace";
      ctx.fillText('// map error: ' + e.message, 10, 30);
      console.error('map error:', e);
    }})();
  </script>
</body>
</html>
