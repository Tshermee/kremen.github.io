<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kremen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --amber: #e8a000;
      --amber-bright: #ffb700;
      --amber-dim: #6b4200;
      --amber-glow: rgba(232, 160, 0, 0.55);
      --bg: #0c0800;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.965; }
    }

    @keyframes cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    html, body {
      min-height: 100vh;
      background: #050300;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem 6rem;
      font-family: 'VT323', monospace;
      font-size: 20px;
      line-height: 1.75;
      color: var(--amber);
      animation: flicker 14s infinite;
    }

    .screen {
      position: relative;
      max-width: 680px;
      width: 100%;
      padding: 3rem 2.5rem;
      background: var(--bg);
      border-radius: 4px;
      box-shadow:
        0 0 0 1px #1c0e00,
        0 0 60px rgba(180, 100, 0, 0.07),
        inset 0 0 100px rgba(0, 0, 0, 0.45);
    }

    /* scanlines */
    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.13) 2px,
        rgba(0, 0, 0, 0.13) 4px
      );
      pointer-events: none;
      z-index: 10;
      border-radius: 4px;
    }

    /* vignette */
    .screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 11;
      border-radius: 4px;
    }

    #content {
      position: relative;
      z-index: 1;
    }

    #content * {
      text-shadow: 0 0 7px var(--amber-glow), 0 0 2px rgba(232, 160, 0, 0.4);
    }

    #content h1 {
      font-size: 2.4em;
      letter-spacing: 0.04em;
      margin-bottom: 0.3em;
      text-shadow: 0 0 14px var(--amber-glow), 0 0 4px rgba(232, 160, 0, 0.5);
    }

    #content h2 {
      font-size: 1.5em;
      margin: 1.6em 0 0.4em;
      color: var(--amber-bright);
      letter-spacing: 0.03em;
      text-shadow: 0 0 10px var(--amber-glow), 0 0 3px rgba(255, 183, 0, 0.5);
    }

    #content h3 {
      font-size: 1.2em;
      margin: 1.2em 0 0.3em;
    }

    #content p {
      margin-bottom: 0.9em;
      opacity: 0.9;
    }

    #content a {
      color: var(--amber-bright);
      text-decoration: none;
      border-bottom: 1px solid var(--amber-dim);
      transition: border-color 0.1s;
    }

    #content a:hover {
      border-bottom-color: var(--amber-bright);
      text-shadow: 0 0 16px var(--amber-glow), 0 0 6px rgba(255, 183, 0, 0.6);
    }

    #content ul,
    #content ol {
      margin: 0 0 0.9em 1.4em;
    }

    #content li {
      margin-bottom: 0.15em;
    }

    #content hr {
      border: none;
      border-top: 1px solid var(--amber-dim);
      margin: 1.6em 0;
      opacity: 0.45;
    }

    #content strong {
      color: var(--amber-bright);
    }

    #content em {
      opacity: 0.75;
      font-style: normal;
    }

    #content code {
      font-family: 'VT323', monospace;
      background: rgba(232, 160, 0, 0.07);
      border: 1px solid var(--amber-dim);
      padding: 0 0.35em;
    }

    #content pre {
      background: rgba(232, 160, 0, 0.05);
      border: 1px solid var(--amber-dim);
      padding: 1em 1.2em;
      margin-bottom: 1em;
      overflow-x: auto;
    }

    #content pre code {
      background: none;
      border: none;
      padding: 0;
    }

    #content blockquote {
      border-left: 2px solid var(--amber-dim);
      padding-left: 1em;
      opacity: 0.7;
    }

    /* blinking cursor while loading */
    #content:empty::after {
      content: '_';
      animation: cursor 1s step-end infinite;
      text-shadow: 0 0 7px var(--amber-glow);
    }
  </style>
</head>
<body>
  <div class="screen">
    <div id="content"></div>
  </div>
  <script>
    marked.setOptions({ breaks: true });

    fetch('content.md')
      .then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.text();
      })
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      })
      .catch(err => {
        document.getElementById('content').textContent = '// error loading content — ' + err.message;
      });
  </script>
</body>
</html>
